<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#102a43"/>
  <!-- Scales of Justice -->
  <line x1="50" y1="14" x2="50" y2="78" stroke="#f0b429" stroke-width="3" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="36" y="78" width="28" height="4" rx="2" fill="#f0b429"/>
  <rect x="30" y="82" width="40" height="5" rx="2.5" fill="#f0b429"/>
  <!-- Left arm -->
  <line x1="50" y1="22" x2="24" y2="36" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="50" y1="22" x2="76" y2="36" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M14 54 L24 36 L34 54" stroke="#f0b429" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M14 54 Q24 64 34 54" stroke="#f0b429" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right pan -->
  <path d="M66 54 L76 36 L86 54" stroke="#f0b429" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M66 54 Q76 64 86 54" stroke="#f0b429" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Top circle -->
  <circle cx="50" cy="18" r="5" fill="#f0b429"/>
</svg>
